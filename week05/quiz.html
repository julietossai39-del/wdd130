<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Form</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <main>
        <h1>Basic HTML and CSS Quiz</h1>
        <form>
            <div class="box">
                <label for="q1">1. Which HTML tag creates a line break</label>
                <input type="text" id="q1" name="q1" required>
            </div>
            <div class="box">
                <label for="q2">2. Which HTML element is used to insert an image</label>
                <textarea name="q2" id="q2"></textarea>
            </div>
            <div class="box">
                <label for="q3">3. What CSS property controls text size</label>
                <select name="q3" id="q3">
                    <option value="a" selected disabled>Choose one...</option>
                    <option value="b">font-style</option>
                    <option value="c">font-size</option>
                    <option value="d">text-size</option>
                </select>
            </div>
            <div class="box">
                <label for="q4">4. What is the margin declaration?</label>
                <div class="code">
                    <code>margin: 10px 5px 15px</code>
                </div>
                <input type="number" name="q4" id="q4">
            </div>
            <div class="submit">
                <button type="submit">Submit Quiz</button>
            </div>
        </form>
    </main>
</body>

</html>
