<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Arrangement</title>
    <link rel="stylesheet" href="styles/position.css">
</head>

<body>
    <!-- 1. FIXED ELEMENT: Stuck to the screen glass -->
    <div class="fixed-header">
        My Fixed Header (Stays at the top of the screen)
    </div>

    <!-- 2. RELATIVE ELEMENT: The Boss Box -->
    <div class="relative-card">

        <!-- 3. ABSOLUTE ELEMENT: The Sticker -->
        <div class="absolute-badge">LIVE</div>

        <h2>Post Title</h2>
        <p>Scroll down the page! This card will move, but the header at the top will stay frozen in
            place.</p>
    </div>
</body>

</html>
