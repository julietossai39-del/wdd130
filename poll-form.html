<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>
        <h1>WDD 130 | HTML Form - UserPoll</h1>
    </header>
    <main>
        <form>

            <fieldset>
                <legend>Contact Information</legend>
                <div class="form-item column2">
                    <label for=" fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" required><br>
                </div>

                <div class="form-item column2">
                    <label for="email">Email</label>
                    <input type="email" id="useremail" name="useremail" required><br>
                </div>
            </fieldset><br>

            <fieldset>
                <legend>Questions</legend>
                <label for="quantity">Select quantity</label>
                <select name="quantity" id="quantity">
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </select><br>

                <label for="browser">What is your favorite browser</label>
                <div class="column1">
                    <select name="browser" id="browser">
                        <option value="chrome">Chrome</option>
                        <option value="firefox">Firefox</option>
                        <option value="edge">Edge</option>
                        <option value="brave">Brave</option>
                        <option value="others">Others</option>
                    </select><br>
                </div>
                <div class="column1">
                    <label for="pet">Do you have a pet?</label>
                    <input type="checkbox" id="pet" name="pet"><br>
                </div>
                <label for="feedback">list the places you have lived:</label>
                <textarea name="feedback" id="feedback" rows="4"
                  placeholder="Still water Florida, Amsterdam Netherlands, Timbuktu Mali"></textarea><br>
            </fieldset>

            <button type="submit">Submit poll</button>
        </form>
    </main>
    <footer>

    </footer>

</body>

</html>
