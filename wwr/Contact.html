<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Exciting Expedition</title>
    <meta name="description"
      content="Get in touch with White Water Rafting. Contact us for reservations, trip inquiries, website suggestions, or general questions about our river adventures.">
    <meta name="author" content="Destiny Ossai">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body class="contact-page">
    <header>
        <img src="images/z-wwr-oars.png" alt="White Water Rafting logo">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main class="contact-info">
        <h1>White Water Rafting Company</h1>
        <p>123 Main River Street</p>
        <p>Kolob Califonia</p>
        <p>+1 999 999 999</p>
        <p>info@whitewater.com</p>
        <div class="contact-grid">
            <div class="contact-map">
                <iframe
                  src="
                  https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6502565.951838051!2d-119.306607!3d37.26950555000001!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808fb9fe5f285e3d%3A0x8b5109a227086f55!2sCalifornia%2C%20USA!5e0!3m2!1sen!2sng!4v1780614209377!5m2!1sen!2sng"
                  width="400" height="400" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form class="wireframe-form">
                <div class="form-row">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="user_name" placeholder="Placeholder">
                </div>

                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="user_email" placeholder="Placeholder">
                </div>

                <div class="form-row alignment-top">
                    <span class="field-title">Message Purpose</span>
                    <div class="radio-choices-block">
                        <label class="inline-radio">
                            <input type="radio" name="purpose" value="general" checked>
                            <span>General Inquiry</span>
                        </label>
                        <label class="inline-radio">
                            <input type="radio" name="purpose" value="reservation">
                            <span>Reservation Question</span>
                        </label>
                        <label class="inline-radio">
                            <input type="radio" name="purpose" value="suggestion">
                            <span>Website Suggestion</span>
                        </label>
                    </div>
                </div>

                <div class="form-row alignment-top">
                    <label for="message">Message</label>
                    <textarea id="message" name="user_message" placeholder="Type here"></textarea>
                </div>

                <div class="form-row-checkbox">
                    <input type="checkbox" id="newsletter" name="subscribe" checked>
                    <label for="newsletter">Please Subscribe me to the monthly newsletter</label>
                </div>

                <button type="submit" class="wireframe-btn">Get in Touch!</button>
            </form>
        </div>
        <section class="wireframe-team-section">
            <h2>We Are Here to Serve You</h2>
            <div class="team-profiles-row">
                <figure class="team-card">
                    <img src="images/office-file1.jpg" alt="Employee Profile Picture">
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure class="team-card">
                    <img src="images/office-file2.jpg" alt="Employee Profile Picture">
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure class="team-card">
                    <img src="images/office-file3.jpg" alt="Employee Profile Picture">
                    <figcaption>Employee Profile</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy;2026⛵White Water Rafting⛵Destiny Ossai.</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook Icon" width="50">
            </a>
            <a href="https://whatsapp.com">
                <img src="images/whatsapp.png" alt="Whatsapp icon" width="50">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram Icon" width="50">
            </a>
        </nav>
    </footer>
</body>

</html>
